<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firewall Invader</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #eee;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100%;
            overflow: hidden;
        }
        #app, #phaser-container {
            width: 100%;
            height: 100vh;
        }
        #fw-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }
        #fw-overlay h2 {
            font-size: 1.6rem;
            margin: 0 0 0.5rem;
        }
        #fw-overlay p {
            margin: 0.25rem 0;
            font-size: 0.95rem;
            opacity: 0.85;
        }
        #fw-overlay .controls {
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.7;
            text-align: center;
            line-height: 1.5;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-DyGh-dNm.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Cfslk-ew.css">
</head>

<body>
    <div id="app">
        <div id="phaser-container">

        </div>
    </div>
    <div id="fw-overlay">
        <h2>Firewall Invader</h2>
        <p>Retro arcade shooter</p>
        <p><strong>Click to start</strong></p>
        <div class="controls">
            WASD or Arrow Keys = Move &nbsp;·&nbsp; Mouse = Aim &nbsp;·&nbsp; Spacebar = Shoot
        </div>
    </div>
    <script>
        (function () {
            var overlay = document.getElementById('fw-overlay');
            if (!overlay) return;
            overlay.addEventListener('click', function () {
                overlay.style.display = 'none';
            }, { once: true });
        })();
    </script>
</body>

</html>
